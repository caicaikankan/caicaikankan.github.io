<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的学习博客</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            max-width: 800px; 
            margin: 0 auto; 
            padding: 2rem; 
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            line-height: 1.6; 
            color: #2c3e50;
            background-color: #ffffff;
        }
        h1 { 
            font-size: 2rem; 
            margin-bottom: 2rem; 
            border-bottom: 1px solid #eee; 
            padding-bottom: 0.5rem;
            font-weight: 600;
        }
        .post-list { list-style: none; }
        .post-item { 
            margin-bottom: 1.5rem;  /* 增加底部间距，更宽松 */
            padding: 0.8rem 0;      /* 增加上下内边距，呼吸感更强 */
            border-bottom: 1px solid #eee; /* 线条更明显，和你朋友一致 */
            display: flex;
            align-items: baseline;
            gap: 1.2rem;            /* 标题和日期间距更大 */
        }
        .post-item a { 
            color: #3498db; 
            text-decoration: none; 
            font-size: 1.1rem;
            flex: 1;
        }
        .post-item a:hover { text-decoration: underline; }
        .post-date { 
            color: #7f8c8d; 
            font-size: 0.9rem;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <h1>我的学习博客</h1>
    <ul class="post-list">
        <li class="post-item">
            <a href="/posts/vibe-coding-6weeks.html">Vibe Coding 六周全纪录：一个人，一支AI开发队伍</a>
            <span class="post-date">2026-04-16</span>
        </li>
        <!-- 后续新文章直接在这里加一行即可 -->
    </ul>
</body>
</html>
