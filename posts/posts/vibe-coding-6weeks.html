<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">我的学习博客</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5.5.1/github-markdown-light.min.css">
    <style>
        .markdown-body { 
            max-width: 800px; 
            margin: 0 auto; 
            padding: 2rem; 
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .header { 
            border-bottom: 1px solid #eee; 
            padding: 1rem 2rem; 
            max-width: 800px; 
            margin: 0 auto;
        }
        .header a { 
            color: #2c3e50; 
            text-decoration: none; 
            font-size: 1.2rem; 
            font-weight: 600;
        }
        .header a:hover { text-decoration: underline; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
</head>
<body>
    <!-- 新增：返回首页按钮，和你朋友的博客样式一致 -->
    <div style="max-width: 800px; margin: 0 auto; padding: 1rem 2rem;">
        <a href="/" style="color: #3498db; text-decoration: none;">← 返回首页</a>
    </div>

    <article class="markdown-body" id="content"></article>

    <script>
        // 自动获取当前文章的md内容并渲染
        const mdPath = window.location.pathname.replace('.html', '.md');
        fetch(mdPath)
            .then(res => res.text())
            .then(md => {
                document.getElementById('content').innerHTML = marked.parse(md);
                // 自动提取文章标题作为页面标题
                const titleMatch = md.match(/^#\s+(.+)$/m);
                if (titleMatch) document.title = titleMatch[1];
            })
            .catch(err => {
                document.getElementById('content').innerHTML = "<p>文章加载失败，请检查路径是否正确。</p>";
                console.error(err);
            });
    </script>
</body>
</html>
