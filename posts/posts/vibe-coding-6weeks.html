<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>共读笔记｜Vibe Coding 六周全纪录</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5.5.1/github-markdown-light.min.css">
    <style>
        /* 全局样式 */
        body {
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, sans-serif;
        }
        /* 返回按钮样式 */
        .back-home {
            margin: 20px 0 10px 40px; /* 固定位置，确保能看到 */
        }
        .back-home a {
            color: #3498db; /* 蓝色，和首页链接同色 */
            text-decoration: none;
            font-size: 16px;
            font-weight: 500;
        }
        .back-home a:hover {
            text-decoration: underline;
        }
        /* 文章内容样式 */
        .markdown-body {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px 40px;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
</head>
<body>
    <!-- 🔥 重点：返回首页按钮（绝对能显示） -->
    <div class="back-home">
        <a href="/">← 返回首页</a>
    </div>

    <!-- 文章内容区域 -->
    <article class="markdown-body" id="content"></article>

    <script>
        // 加载并渲染Markdown文章
        const mdPath = window.location.pathname.replace('.html', '.md');
        fetch(mdPath)
            .then(res => res.text())
            .then(md => {
                document.getElementById('content').innerHTML = marked.parse(md);
            })
            .catch(err => {
                document.getElementById('content').innerHTML = "<p>文章加载失败，请检查路径！</p>";
                console.error(err);
            });
    </script>
</body>
</html>
